name: Release Desktop Matrix

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (optional, defaults from tag/package/run number)"
        required: false
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build + Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Validate Mongo secrets
        shell: bash
        run: |
          if [[ -z "${MONGODB_URI}" ]]; then
            echo "MONGODB_URI secret is required for release publish."
            exit 1
          fi
          if [[ -z "${MONGODB_DB_NAME}" ]]; then
            echo "MONGODB_DB_NAME secret is required for release publish."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release metadata
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          INPUT_NOTES="${{ github.event.inputs.notes }}"

          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.${GITHUB_RUN_NUMBER}"
          fi

          if [[ -n "${INPUT_NOTES}" ]]; then
            NOTES="${INPUT_NOTES}"
          else
            NOTES="Automated ${RUNNER_OS} build from ${GITHUB_SHA}"
          fi

          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=${NOTES}" >> "$GITHUB_ENV"

      - name: Build stable host artifact
        run: bun run build:stable

      - name: Publish artifacts to MongoDB GridFS
        shell: bash
        run: |
          bun run release:publish --version "${RELEASE_VERSION}" --notes "${RELEASE_NOTES}"

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.os }}-${{ env.RELEASE_VERSION }}
          path: artifacts/*
          if-no-files-found: ignore
